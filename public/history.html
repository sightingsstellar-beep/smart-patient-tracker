<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="theme-color" content="#2f7f9f" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="manifest" href="/manifest.json" />
  <title>Glide Bedside — Trends</title>
  <link rel="stylesheet" href="/vendor/phosphor/regular/style.css" />
  <link rel="stylesheet" href="/vendor/phosphor/fill/style.css" />
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="history.css" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
</head>
<body>
  <header class="header">
    <div class="header-top">
      <div class="header-left">
        <h1 class="title"><span id="child-name">…</span> <span class="heart">💙</span></h1>
        <div class="subtitle" id="current-date">Loading...</div>
      </div>
      <div class="header-right">
        <a href="/logout" class="logout-btn" title="Log out">⏻</a>
        <div class="clock" id="current-time">--:--</div>
      </div>
    </div>
    <nav class="tab-bar" aria-label="Primary">
      <a href="/" class="tab-item">
        <span class="tab-icon" aria-hidden="true">
          <i class="tab-icon-outline ph ph-drop"></i>
          <i class="tab-icon-fill ph-fill ph-drop"></i>
        </span>
        <span class="tab-label">Day</span>
      </a>
      <a href="/history" class="tab-item active" aria-current="page">
        <span class="tab-icon" aria-hidden="true">
          <i class="tab-icon-outline ph ph-chart-line-up"></i>
          <i class="tab-icon-fill ph-fill ph-chart-line-up"></i>
        </span>
        <span class="tab-label">Trends</span>
      </a>
      <a href="/chat" class="tab-item">
        <span class="tab-icon" aria-hidden="true">
          <i class="tab-icon-outline ph ph-microphone"></i>
          <i class="tab-icon-fill ph-fill ph-microphone"></i>
        </span>
        <span class="tab-label">Chat</span>
      </a>
      <a href="/settings" class="tab-item">
        <span class="tab-icon" aria-hidden="true">
          <i class="tab-icon-outline ph ph-gear-six"></i>
          <i class="tab-icon-fill ph-fill ph-gear-six"></i>
        </span>
        <span class="tab-label">Settings</span>
      </a>
    </nav>
  </header>

  <main class="main history-main">
    <section class="trends-toolbar card">
      <div class="trends-toolbar-top">
        <div>
          <h2 class="trends-heading">📈 Trends</h2>
          <p class="trends-subheading">Tap any bar or point to jump into that day.</p>
        </div>
      </div>
      <div class="range-pills" id="range-pills">
        <button class="range-pill active" data-range="7">7D</button>
        <button class="range-pill" data-range="30">30D</button>
        <button class="range-pill" data-range="90">90D</button>
      </div>
    </section>

    <div id="trends-container">
      <div class="h-loading">Loading trends…</div>
    </div>
  </main>

  <footer class="footer">
    <span>Last updated: <span id="last-updated">--</span></span>
  </footer>

  <script src="auth-fetch.js"></script>
  <script src="history.js"></script>
</body>
</html>
