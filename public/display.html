<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=960, initial-scale=1.0">
  <title>Fluid Status</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #080f20;
      color: white;
      font-family: -apple-system, 'Segoe UI', Arial, sans-serif;
      width: 960px;
      height: 480px;
      overflow: hidden;
    }

    /* ── Header ───────────────────────────────────────── */
    .header {
      background: #050c1a;
      height: 46px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      border-bottom: 1px solid #1a2d4d;
    }
    .header-title {
      font-size: 17px;
      font-weight: 600;
      color: #8aaad0;
      letter-spacing: 0.3px;
    }
    .header-updated {
      font-size: 13px;
      color: #3a5070;
    }
    .header-updated span { color: #5a7a9a; }

    /* ── 3-column layout ──────────────────────────────── */
    .body {
      display: grid;
      grid-template-columns: 255px 1fr 255px;
      height: 434px;
    }

    /* ── Side panels ──────────────────────────────────── */
    .panel {
      display: flex;
      flex-direction: column;
      padding: 18px 20px 14px;
      border-right: 1px solid #0f1e35;
      overflow: hidden;
    }
    .panel:last-child { border-right: none; }

    .panel-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.4px;
      padding-bottom: 10px;
      border-bottom: 1px solid #0f1e35;
      margin-bottom: 8px;
      flex-shrink: 0;
    }
    .panel-label.intake { color: #4a9eff; }
    .panel-label.output { color: #f08c00; }

    .fluid-list { flex: 1; display: flex; flex-direction: column; gap: 2px; }

    .fluid-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 9px 6px;
      border-bottom: 1px solid #0a1525;
      flex: 1;
    }
    .fluid-row:last-child { border-bottom: none; }

    .fluid-name {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 19px;
      color: #ccd8ee;
    }
    .fluid-amount {
      font-size: 21px;
      font-weight: 700;
      color: white;
    }

    .dot {
      width: 11px;
      height: 11px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .no-data {
      color: #243550;
      font-size: 15px;
      font-style: italic;
      padding-top: 12px;
      text-align: center;
    }

    /* ── Center donut panel ───────────────────────────── */
    .donut-panel {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    .donut-panel svg {
      display: block;
    }

    /* ── Legend below donut ───────────────────────────── */
    .donut-legend {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px 18px;
      padding: 0 10px;
      margin-top: 6px;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 13px;
      color: #8aaad0;
    }
    .legend-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-title" id="patient-title">💧 Fluid Status</div>
    <div class="header-updated">Updated <span id="last-updated">—</span></div>
  </div>

  <div class="body">

    <!-- Left: Intake breakdown -->
    <div class="panel">
      <div class="panel-label intake">↑ Intake by type</div>
      <div class="fluid-list" id="intake-list">
        <div class="no-data">No intake today</div>
      </div>
    </div>

    <!-- Center: Donut chart -->
    <div class="donut-panel">
      <svg id="donut-svg" width="370" height="356" viewBox="0 0 370 356">
        <!-- Background track ring -->
        <circle id="track" cx="185" cy="174" r="152" fill="none"
          stroke="#0f1e35" stroke-width="44"/>
        <!-- Colored segments injected here by JS -->
        <g id="segments"></g>
        <!-- Center text -->
        <text id="c-intake" x="185" y="152" text-anchor="middle"
          fill="white" font-size="54" font-weight="bold"
          font-family="-apple-system, Arial, sans-serif">0</text>
        <text id="c-unit" x="185" y="178" text-anchor="middle"
          fill="#3a5a7a" font-size="16"
          font-family="-apple-system, Arial, sans-serif">ml of 1200</text>
        <text id="c-pct" x="185" y="216" text-anchor="middle"
          fill="#4a9eff" font-size="36" font-weight="bold"
          font-family="-apple-system, Arial, sans-serif">0%</text>
      </svg>
      <div class="donut-legend" id="donut-legend"></div>
    </div>

    <!-- Right: Output breakdown -->
    <div class="panel">
      <div class="panel-label output">↓ Output by type</div>
      <div class="fluid-list" id="output-list">
        <div class="no-data">No output today</div>
      </div>
    </div>

  </div>

  <script>
    const TOKEN = new URLSearchParams(location.search).get('token') || '';

    // Fluid type colors (shared with APL)
    const FLUID_COLORS = {
      water:        '#2a8aff',
      pediasure:    '#f08c00',
      milk:         '#90aec8',
      juice:        '#e03030',
      yogurt_drink: '#8a48cc',
      urine:        '#d4b800',
      poop:         '#8b4513',
      vomit:        '#25a060',
    };
    const LABELS = {
      water: 'Water', pediasure: 'PediaSure', milk: 'Milk',
      juice: 'Juice', yogurt_drink: 'Yogurt Drink',
      urine: 'Urine', poop: 'Poop', vomit: 'Vomit',
    };

    // SVG donut arc math
    function polar(cx, cy, r, deg) {
      const rad = (deg - 90) * Math.PI / 180;
      return { x: cx + r * Math.cos(rad), y: cy + r * Math.sin(rad) };
    }
    function arcPath(cx, cy, outerR, innerR, a1, a2) {
      const o1 = polar(cx, cy, outerR, a1), o2 = polar(cx, cy, outerR, a2);
      const i1 = polar(cx, cy, innerR, a1), i2 = polar(cx, cy, innerR, a2);
      const laf = (a2 - a1) > 180 ? 1 : 0;
      return [
        `M ${f(o1.x)} ${f(o1.y)}`,
        `A ${outerR} ${outerR} 0 ${laf} 1 ${f(o2.x)} ${f(o2.y)}`,
        `L ${f(i2.x)} ${f(i2.y)}`,
        `A ${innerR} ${innerR} 0 ${laf} 0 ${f(i1.x)} ${f(i1.y)}`,
        'Z'
      ].join(' ');
    }
    function f(n) { return n.toFixed(2); }

    function buildDonut(cx, cy, outerR, innerR, segments, dailyLimit) {
      const paths = [];
      let angle = 0;
      for (const seg of segments) {
        if (seg.ml <= 0) continue;
        const sweep = Math.min(359.98 - angle, (seg.ml / dailyLimit) * 360);
        if (sweep <= 0) continue;
        const d = arcPath(cx, cy, outerR, innerR, angle, angle + sweep);
        paths.push(`<path d="${d}" fill="${seg.color}" stroke="#080f20" stroke-width="3"/>`);
        angle += sweep;
      }
      return paths.join('');
    }

    async function refresh() {
      try {
        const r = await fetch('/api/display-data?token=' + encodeURIComponent(TOKEN));
        if (!r.ok) { console.error('Error:', r.status); return; }
        const d = await r.json();
        render(d);
        document.getElementById('last-updated').textContent =
          new Date().toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
      } catch (e) { console.error('Refresh failed:', e); }
    }

    function render(d) {
      const intake   = d.totalIntake || 0;
      const limit    = d.dailyLimit  || 1200;
      const pct      = Math.min(100, Math.round((intake / limit) * 100));
      const pctColor = pct >= 90 ? '#e74c3c' : pct >= 75 ? '#f39c12' : '#4a9eff';

      // Update center text
      document.getElementById('c-intake').textContent = intake;
      document.getElementById('c-unit').textContent   = `ml of ${limit}`;
      document.getElementById('c-pct').textContent    = pct + '%';
      document.getElementById('c-pct').setAttribute('fill', pctColor);

      // Patient name
      if (d.patientName) {
        document.getElementById('patient-title').textContent =
          '💧 ' + d.patientName + ' — Fluid Status';
      }

      // Build ordered segments from intakeByType (sorted largest first)
      const intakeEntries = Object.entries(d.intakeByType || {})
        .sort((a, b) => b[1] - a[1]);

      const segments = intakeEntries.map(([type, ml]) => ({
        type, ml, color: FLUID_COLORS[type] || '#4a9eff'
      }));

      // Draw donut
      document.getElementById('segments').innerHTML =
        buildDonut(185, 174, 174, 130, segments, limit);

      // Legend below donut
      document.getElementById('donut-legend').innerHTML = segments
        .map(s => `<div class="legend-item">
          <div class="legend-dot" style="background:${s.color}"></div>
          <span>${LABELS[s.type] || s.type}</span>
        </div>`).join('');

      // Intake list (left panel)
      const intakeEl = document.getElementById('intake-list');
      if (intakeEntries.length > 0) {
        intakeEl.innerHTML = intakeEntries.map(([type, ml]) => `
          <div class="fluid-row">
            <span class="fluid-name">
              <span class="dot" style="background:${FLUID_COLORS[type] || '#4a9eff'}"></span>
              ${LABELS[type] || type}
            </span>
            <span class="fluid-amount">${ml} ml</span>
          </div>`).join('');
      } else {
        intakeEl.innerHTML = '<div class="no-data">No intake today</div>';
      }

      // Output list (right panel)
      const outputEl  = document.getElementById('output-list');
      const outputEntries = Object.entries(d.outputByType || {})
        .sort((a, b) => (b[1].ml || 0) - (a[1].ml || 0));
      if (outputEntries.length > 0) {
        outputEl.innerHTML = outputEntries.map(([type, data]) => `
          <div class="fluid-row">
            <span class="fluid-name">
              <span class="dot" style="background:${FLUID_COLORS[type] || '#f08c00'}"></span>
              ${LABELS[type] || type}
            </span>
            <span class="fluid-amount">${data.display}</span>
          </div>`).join('');
      } else {
        outputEl.innerHTML = '<div class="no-data">No output today</div>';
      }
    }

    refresh();
    setInterval(refresh, 60 * 1000);
  </script>
</body>
</html>
